<!DOCTYPE html>
<html>
<head>
    <title>Security Dashboard</title>
</head>
<body>

<h1>Security Incident Dashboard</h1>

<h2>Incidentes</h2>

<ul>

{% for incident in incidents %}

    <li>
        {{ incident.title }}
        -
        {{ incident.severity }}
        -
        {{ incident.status }}
    </li>

{% endfor %}

</ul>

</body>
</html>
